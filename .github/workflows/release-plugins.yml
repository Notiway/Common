name: Release Common.Plugins

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: 'Prerelease label (e.g. beta). Leave empty for stable release.'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  release:
    uses: ./.github/workflows/release.yml
    with:
      project: Notiway.Common.Plugins
      bump: ${{ inputs.bump }}
      prerelease: ${{ inputs.prerelease }}
    secrets:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
