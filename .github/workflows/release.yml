name: .NET SemVer Publish Modified Projects

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write        # required for GitHub Releases
  packages: write

env:
  MAJOR: ""
  MINOR: ""
  PATCH: ""

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # needed to read full history and tags

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # -------------------------------
      # 1) Detect modified projects
      # -------------------------------
      - name: Detect modified projects
        id: modified
        run: |
          PROJECTS=("Notiway.Common.Core" "Notiway.Common.Plugins")
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          CHANGED_DIRS=$(git diff --name-only $LAST_TAG HEAD | awk -F/ '{print $1}' | sort -u)
          
          PROJECTS_TO_RELEASE=()
          for PROJ in "${PROJECTS[@]}"; do
            if echo "$CHANGED_DIRS" | grep -q "^$PROJ$"; then
              PROJECTS_TO_RELEASE+=("$PROJ")
            fi
          done
          
          if [ ${#PROJECTS_TO_RELEASE[@]} -eq 0 ]; then
            echo "No modified projects detected. Exiting."
            exit 0
          fi
          
          echo "PROJECTS_TO_RELEASE=${PROJECTS_TO_RELEASE[*]}" >> $GITHUB_OUTPUT
          echo "Projects to release: ${PROJECTS_TO_RELEASE[*]}"

      # -------------------------------
      # 2) Fetch latest package version (use first modified project)
      # -------------------------------
      - name: Fetch latest published version
        id: get_version
        run: |
          FIRST_PROJECT=$(echo "${{ steps.modified.outputs.PROJECTS_TO_RELEASE }}" | awk '{print $1}')
      
          RESPONSE=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/users/Notiway/packages/nuget/$FIRST_PROJECT/versions)
      
          # Detect response shape (array vs object)
          if echo "$RESPONSE" | jq -e 'type=="array"' >/dev/null; then
            LATEST=$(echo "$RESPONSE" | jq -r '.[0].name')
          else
            LATEST=$(echo "$RESPONSE" | jq -r '.versions[0].name')
          fi
      
          if [[ -z "$LATEST" || "$LATEST" == "null" ]]; then
            echo "No previous package found, defaulting to 0.0.0"
            LATEST="0.0.0"
          fi
      
          echo "LATEST_VERSION=$LATEST" >> $GITHUB_OUTPUT
          echo "Latest version: $LATEST"

      # -------------------------------
      # 3) Determine semantic version bump from commits
      # -------------------------------
      - name: Determine bump type
        id: bump
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [[ -z "$LAST_TAG" ]]; then
            COMMITS=$(git log --pretty=format:"%s")
          else
            COMMITS=$(git log $LAST_TAG..HEAD --pretty=format:"%s")
          fi

          if echo "$COMMITS" | grep -qi "BREAKING CHANGE"; then
            BUMP=major
          elif echo "$COMMITS" | grep -qi "^feat"; then
            BUMP=minor
          elif echo "$COMMITS" | grep -qi "^fix"; then
            BUMP=patch
          else
            BUMP=patch
          fi

          echo "BUMP_TYPE=$BUMP" >> $GITHUB_OUTPUT

      # -------------------------------
      # 4) Calculate new version
      # -------------------------------
      - name: Calculate new version
        id: calc_version
        run: |
          IFS='.' read -r CUR_MAJOR CUR_MINOR CUR_PATCH <<< "${{ steps.get_version.outputs.LATEST_VERSION }}"
          MAJOR=${MAJOR:-$CUR_MAJOR}
          MINOR=${MINOR:-$CUR_MINOR}
          PATCH=${PATCH:-$CUR_PATCH}

          case "${{ steps.bump.outputs.BUMP_TYPE }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          VERSION="$MAJOR.$MINOR.$PATCH"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION=$VERSION"

      # -------------------------------
      # 5) Restore all projects
      # -------------------------------
      - name: Restore all projects with GitHub Packages source
        run: |
          dotnet nuget add source "https://nuget.pkg.github.com/Notiway/index.json" \
            --name "github" \
            --username "Notiway" \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --store-password-in-clear-text
      
          dotnet restore

      # -------------------------------
      # 6) Build and Test all projects
      # -------------------------------
      - name: Build
        run: dotnet build --configuration Release /p:Version=${VERSION}

      - name: Test
        run: dotnet test --no-build --verbosity normal /p:Version=${VERSION}

      # -------------------------------
      # 7) Pack and Push only modified projects
      # -------------------------------
      - name: Pack & Push modified projects
        run: |
          for PROJ in ${{ steps.modified.outputs.PROJECTS_TO_RELEASE }}; do
            echo "Packing $PROJ..."
            dotnet pack $PROJ/$PROJ.csproj --configuration Release /p:Version=${VERSION} --no-build --output .
            echo "Pushing $PROJ..."
            dotnet nuget push $PROJ.${VERSION}.nupkg --source https://nuget.pkg.github.com/Notiway/index.json --api-key ${{ secrets.GITHUB_TOKEN }}
          done

      # -------------------------------
      # 8) Generate per-project release notes
      # -------------------------------
      - name: Generate release notes
        id: release_notes
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          RELEASE_NOTES=""
          for PROJ in ${{ steps.modified.outputs.PROJECTS_TO_RELEASE }}; do
            if [[ -z "$LAST_TAG" ]]; then
              NOTES=$(git log --pretty=format:"- %s" -- $PROJ)
            else
              NOTES=$(git log $LAST_TAG..HEAD --pretty=format:"- %s" -- $PROJ)
            fi
            if [[ -n "$NOTES" ]]; then
              RELEASE_NOTES="$RELEASE_NOTES\n## $PROJ\n$NOTES\n"
            fi
          done
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_ENV
          echo -e "$RELEASE_NOTES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # -------------------------------
      # 9) Create GitHub Release
      # -------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          body: ${{ env.RELEASE_NOTES }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
