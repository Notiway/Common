name: Release

on:
  push:
    branches: [ "main" ]
  workflow_call:
    inputs:
      project:
        description: 'Project to release'
        required: true
        type: string
      bump:
        description: 'Version bump type: major, minor, or patch'
        required: true
        type: string
      prerelease:
        description: 'Prerelease label (e.g. alpha, beta). Leave empty for stable release.'
        required: false
        default: ''
        type: string
    secrets:
      NUGET_API_KEY:
        required: false

permissions:
  contents: write

env:
  MAJOR: ""
  MINOR: ""
  PATCH: ""
  PRERELEASE: ${{ inputs.prerelease || (github.event_name == 'push' && 'beta') || '' }}

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # -------------------------------
      # 1) Determine projects to release
      # -------------------------------
      - name: Determine projects to release
        id: modified
        run: |
          ALL_PROJECTS=("Notiway.Common.Core" "Notiway.Common.Plugins")

          if [[ -n "${{ inputs.project }}" ]]; then
            # Manual dispatch: release the specified project
            PROJECTS_TO_RELEASE=("${{ inputs.project }}")
          else
            # Push to main: only release modified projects
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            CHANGED_DIRS=$(git diff --name-only $LAST_TAG HEAD | awk -F/ '{print $1}' | sort -u)

            PROJECTS_TO_RELEASE=()
            for PROJ in "${ALL_PROJECTS[@]}"; do
              if echo "$CHANGED_DIRS" | grep -q "^$PROJ$"; then
                PROJECTS_TO_RELEASE+=("$PROJ")
              fi
            done
          fi

          if [ ${#PROJECTS_TO_RELEASE[@]} -eq 0 ]; then
            echo "No projects to release. Skipping."
            echo "HAS_PROJECTS=false" >> $GITHUB_OUTPUT
          else
            echo "HAS_PROJECTS=true" >> $GITHUB_OUTPUT
            echo "PROJECTS_TO_RELEASE=${PROJECTS_TO_RELEASE[*]}" >> $GITHUB_OUTPUT
            echo "Projects to release: ${PROJECTS_TO_RELEASE[*]}"
          fi

      # -------------------------------
      # 2) Fetch latest version from NuGet.org
      # -------------------------------
      - name: Fetch latest published version
        if: steps.modified.outputs.HAS_PROJECTS == 'true'
        id: get_version
        run: |
          FIRST_PROJECT=$(echo "${{ steps.modified.outputs.PROJECTS_TO_RELEASE }}" | awk '{print $1}')

          RESPONSE=$(curl -s "https://api.nuget.org/v3-flatcontainer/${FIRST_PROJECT,,}/index.json")
          ALL_VERSIONS=$(echo "$RESPONSE" | jq -r '.versions[]' 2>/dev/null || echo "")

          # Find latest stable version (no hyphen = no prerelease suffix)
          LATEST_STABLE=$(echo "$ALL_VERSIONS" | grep -v '-' | sort -t. -k1,1n -k2,2n -k3,3n | tail -1)

          # If no stable version, extract base version from latest prerelease (e.g. 0.7.8-beta.1 -> 0.7.8)
          if [[ -z "$LATEST_STABLE" || "$LATEST_STABLE" == "null" ]]; then
            LATEST_STABLE=$(echo "$ALL_VERSIONS" | sed 's/-.*//' | sort -t. -k1,1n -k2,2n -k3,3n | tail -1)
          fi

          if [[ -z "$LATEST_STABLE" || "$LATEST_STABLE" == "null" ]]; then
            LATEST_STABLE="0.0.0"
          fi

          # Find highest prerelease number for the current label (if prerelease mode)
          PRERELEASE_COUNTER=0
          if [[ -n "$PRERELEASE" ]]; then
            PRERELEASE_COUNTER=$(echo "$ALL_VERSIONS" | grep -oP "(?<=-${PRERELEASE}\.)\d+" | sort -n | tail -1)
            PRERELEASE_COUNTER=${PRERELEASE_COUNTER:-0}
          fi

          echo "LATEST_VERSION=$LATEST_STABLE" >> $GITHUB_OUTPUT
          echo "PRERELEASE_COUNTER=$PRERELEASE_COUNTER" >> $GITHUB_OUTPUT
          echo "Latest stable version: $LATEST_STABLE"
          echo "Prerelease counter: $PRERELEASE_COUNTER"

      # -------------------------------
      # 3) Determine semantic version bump
      # -------------------------------
      - name: Determine bump type
        if: steps.modified.outputs.HAS_PROJECTS == 'true'
        id: bump
        run: |
          if [[ -n "${{ inputs.bump }}" ]]; then
            BUMP="${{ inputs.bump }}"
          else
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [[ -z "$LAST_TAG" ]]; then
              COMMITS=$(git log --pretty=format:"%s")
            else
              COMMITS=$(git log $LAST_TAG..HEAD --pretty=format:"%s")
            fi

            if echo "$COMMITS" | grep -qi "BREAKING CHANGE"; then
              BUMP=major
            elif echo "$COMMITS" | grep -qi "^feat"; then
              BUMP=minor
            elif echo "$COMMITS" | grep -qi "^fix"; then
              BUMP=patch
            else
              BUMP=patch
            fi
          fi

          echo "BUMP_TYPE=$BUMP" >> $GITHUB_OUTPUT
          echo "Bump type: $BUMP"

      # -------------------------------
      # 4) Calculate new version
      # -------------------------------
      - name: Calculate new version
        if: steps.modified.outputs.HAS_PROJECTS == 'true'
        id: calc_version
        run: |
          IFS='.' read -r CUR_MAJOR CUR_MINOR CUR_PATCH <<< "${{ steps.get_version.outputs.LATEST_VERSION }}"
          MAJOR=${MAJOR:-$CUR_MAJOR}
          MINOR=${MINOR:-$CUR_MINOR}
          PATCH=${PATCH:-$CUR_PATCH}

          case "${{ steps.bump.outputs.BUMP_TYPE }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          if [[ -n "$PRERELEASE" ]]; then
            COUNTER=${{ steps.get_version.outputs.PRERELEASE_COUNTER }}
            COUNTER=$((COUNTER + 1))
            VERSION="$MAJOR.$MINOR.$PATCH-${PRERELEASE}.${COUNTER}"
          else
            VERSION="$MAJOR.$MINOR.$PATCH"
          fi

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION=$VERSION"

      # -------------------------------
      # 5) Restore, Build, Test
      # -------------------------------
      - name: Restore
        if: steps.modified.outputs.HAS_PROJECTS == 'true'
        run: dotnet restore

      - name: Build
        if: steps.modified.outputs.HAS_PROJECTS == 'true'
        run: dotnet build --configuration Release /p:Version=${VERSION}

      - name: Test
        if: steps.modified.outputs.HAS_PROJECTS == 'true'
        run: dotnet test --no-build --verbosity normal /p:Version=${VERSION}

      # -------------------------------
      # 6) Pack and Push
      # -------------------------------
      - name: Pack & Push
        if: steps.modified.outputs.HAS_PROJECTS == 'true'
        env:
          NUGET_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          for PROJ in ${{ steps.modified.outputs.PROJECTS_TO_RELEASE }}; do
            echo "Packing $PROJ..."
            dotnet pack $PROJ/$PROJ.csproj --configuration Release /p:Version=${VERSION} --no-build --output .
            echo "Pushing $PROJ to NuGet.org..."
            dotnet nuget push $PROJ.${VERSION}.nupkg --source https://api.nuget.org/v3/index.json --api-key "${NUGET_KEY}"
          done

      # -------------------------------
      # 7) Generate release notes
      # -------------------------------
      - name: Generate release notes
        if: steps.modified.outputs.HAS_PROJECTS == 'true'
        id: release_notes
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          RELEASE_NOTES=""
          for PROJ in ${{ steps.modified.outputs.PROJECTS_TO_RELEASE }}; do
            if [[ -z "$LAST_TAG" ]]; then
              NOTES=$(git log --pretty=format:"- %s" -- $PROJ)
            else
              NOTES=$(git log $LAST_TAG..HEAD --pretty=format:"- %s" -- $PROJ)
            fi
            if [[ -n "$NOTES" ]]; then
              RELEASE_NOTES="$RELEASE_NOTES\n## $PROJ\n$NOTES\n"
            fi
          done
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_ENV
          echo -e "$RELEASE_NOTES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # -------------------------------
      # 8) Create GitHub Release
      # -------------------------------
      - name: Create GitHub Release
        if: steps.modified.outputs.HAS_PROJECTS == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          body: ${{ env.RELEASE_NOTES }}
          draft: false
          prerelease: ${{ env.PRERELEASE != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
