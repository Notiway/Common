name: .NET SemVer Publish

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write         # MUST be write for GitHub Releases
  packages: write

env:
  MAJOR: ""
  MINOR: ""
  PATCH: ""

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # --------------------------------------------------------
      # 1) GET LATEST PACKAGE VERSION
      # --------------------------------------------------------
      - name: Fetch latest published version from GitHub Packages
        id: get_version
        run: |
          PACKAGE_INFO=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/users/Notiway/packages/nuget/Notiway.Common.Core/versions)

          LATEST=$(echo "$PACKAGE_INFO" | jq -r '.[0].name')

          if [[ "$LATEST" == "null" || -z "$LATEST" ]]; then
            echo "No previous packages found. Using 0.0.0"
            LATEST="0.0.0"
          fi

          echo "LATEST_VERSION=$LATEST" >> $GITHUB_OUTPUT

      # --------------------------------------------------------
      # 2) DETERMINE SEMVER BUMP TYPE FROM COMMITS
      # --------------------------------------------------------
      - name: Determine bump type from commits
        id: bump
        run: |
          COMMITS=$(git log -n 20 --pretty=format:"%s")

          if echo "$COMMITS" | grep -qi "BREAKING CHANGE"; then
            BUMP=major
          elif echo "$COMMITS" | grep -qi "^feat"; then
            BUMP=minor
          elif echo "$COMMITS" | grep -qi "^fix"; then
            BUMP=patch
          else
            BUMP=patch
          fi

          echo "BUMP_TYPE=$BUMP" >> $GITHUB_OUTPUT

      # --------------------------------------------------------
      # 3) CALCULATE NEW VERSION
      # --------------------------------------------------------
      - name: Calculate new version
        id: calc_version
        run: |
          IFS='.' read -r CUR_MAJOR CUR_MINOR CUR_PATCH <<< "${{ steps.get_version.outputs.LATEST_VERSION }}"

          MAJOR=${MAJOR:-$CUR_MAJOR}
          MINOR=${MINOR:-$CUR_MINOR}
          PATCH=${PATCH:-$CUR_PATCH}

          case "${{ steps.bump.outputs.BUMP_TYPE }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          VERSION="$MAJOR.$MINOR.$PATCH"

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION=$VERSION"

      # --------------------------------------------------------
      # 4) RESTORE • BUILD • TEST
      # --------------------------------------------------------
      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release /p:Version=${VERSION}

      - name: Test
        run: dotnet test --no-build --verbosity normal /p:Version=${VERSION}

      # --------------------------------------------------------
      # 5) PACK
      # --------------------------------------------------------
      - name: Pack
        run: dotnet pack --configuration Release /p:Version=${VERSION} --no-build --output .

      # --------------------------------------------------------
      # 6) PUSH PACKAGE
      # --------------------------------------------------------
      - name: Push
        run: dotnet nuget push Notiway.Common.Core.${VERSION}.nupkg --source https://nuget.pkg.github.com/Notiway/index.json --api-key ${{ secrets.GITHUB_TOKEN }}

      # --------------------------------------------------------
      # 7) GENERATE RELEASE NOTES
      # --------------------------------------------------------
      - name: Generate release notes
        id: notes
        run: |
          NOTES=$(git log -n 20 --pretty=format:"- %s")
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_ENV
          echo "$NOTES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # --------------------------------------------------------
      # 8) CREATE GITHUB RELEASE
      # --------------------------------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          body: ${{ env.RELEASE_NOTES }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
