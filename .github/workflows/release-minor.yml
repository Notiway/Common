name: Create Minor Release

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Prerelease label (e.g. beta). Leave empty for stable release.'
        required: false
        default: ''
        type: string

jobs:
  release:
    uses: ./.github/workflows/release.yml
    with:
      bump: minor
      prerelease: ${{ inputs.prerelease }}
